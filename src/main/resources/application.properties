# ╔══════════════════════════════════════════════════════════════╗
# ║       Smart Hostel Management System - Configuration        ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Application ───────────────────────────────────────────────
spring.application.name=hostel-management-system
server.port=8080

# ── Database (H2 for Development) ─────────────────────────────
# Switch to MySQL for production by uncommenting the MySQL section
spring.datasource.url=jdbc:h2:mem:hosteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL (Production) ────────────────────────────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/hostel_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Data Initialization ──────────────────────────────────────
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── Jackson (JSON) ────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── Logging ───────────────────────────────────────────────────
logging.level.com.hostel=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# ── Actuator (Health Monitoring) ──────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Smart Hostel Management System
info.app.version=1.0.0
info.app.description=Industry-grade hostel operations automation platform
